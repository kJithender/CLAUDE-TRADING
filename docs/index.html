<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bull vs AGGRO vs SPY</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
         sans-serif; background: #0d1117; color: #e6edf3; margin: 0;
         padding: 24px; }
  h1 { font-size: 1.3rem; margin: 0 0 4px; }
  p.sub { color: #8b949e; margin: 0 0 20px; font-size: .9rem; }
  #wrap { max-width: 960px; margin: 0 auto; }
  #msg { color: #8b949e; padding: 40px 0; text-align: center; }
  canvas { background: #161b22; border-radius: 8px; padding: 8px; }
  table { border-collapse: collapse; margin-top: 20px; font-size: .9rem; }
  td, th { padding: 6px 14px; border-bottom: 1px solid #21262d;
           text-align: right; }
  th:first-child, td:first-child { text-align: left; }
</style>
</head>
<body>
<div id="wrap">
  <h1>🐂 Bull vs 🔥 AGGRO vs SPY</h1>
  <p class="sub">Daily closing equity, normalized to 100 at each series'
  first data point. Data: <code>memory/performance.csv</code> on
  <code>main</code>, appended by the close routines.</p>
  <div id="msg">Loading…</div>
  <canvas id="chart" height="110" style="display:none"></canvas>
  <table id="stats" style="display:none">
    <thead><tr><th>Series</th><th>Start</th><th>Latest</th>
    <th>Return</th></tr></thead>
    <tbody></tbody>
  </table>
</div>
<script>
const CSV_URL =
  "https://raw.githubusercontent.com/adhabnr-ux/CLAUDE-TRADING/main/memory/performance.csv";

function pct(a, b) { return ((b / a - 1) * 100).toFixed(2) + "%"; }

async function main() {
  const msg = document.getElementById("msg");
  let text;
  try {
    const res = await fetch(CSV_URL, { cache: "no-store" });
    if (!res.ok) throw new Error(res.status);
    text = await res.text();
  } catch (e) {
    msg.textContent =
      "No data yet — memory/performance.csv appears after the first close " +
      "routine runs with the dashboard update. (" + e + ")";
    return;
  }

  // rows: date,agent,equity,cash,spy_close
  const rows = text.trim().split("\n").slice(1)
    .map(l => l.split(","))
    .filter(r => r.length >= 5 && !isNaN(parseFloat(r[2])));
  if (!rows.length) { msg.textContent = "CSV exists but has no data rows yet."; return; }

  const series = { bull: new Map(), aggro: new Map(), spy: new Map() };
  for (const [date, agent, equity, _cash, spy] of rows) {
    const a = agent.trim().toLowerCase();
    if (series[a]) series[a].set(date, parseFloat(equity));
    const s = parseFloat(spy);
    if (!isNaN(s) && s > 0 && !series.spy.has(date)) series.spy.set(date, s);
  }

  const labels = [...new Set(rows.map(r => r[0]))].sort();
  const colors = { bull: "#3fb950", aggro: "#f85149", spy: "#8b949e" };
  const names  = { bull: "Bull (cautious)", aggro: "AGGRO Bull", spy: "SPY" };
  const datasets = [];
  const statsBody = document.querySelector("#stats tbody");

  for (const key of ["bull", "aggro", "spy"]) {
    const m = series[key];
    if (!m.size) continue;
    const first = m.get([...m.keys()].sort()[0]);
    datasets.push({
      label: names[key],
      data: labels.map(d => m.has(d) ? (m.get(d) / first) * 100 : null),
      borderColor: colors[key],
      backgroundColor: colors[key],
      spanGaps: true, tension: 0.2, pointRadius: 2,
    });
    const sorted = [...m.keys()].sort();
    const last = m.get(sorted[sorted.length - 1]);
    statsBody.insertAdjacentHTML("beforeend",
      `<tr><td>${names[key]}</td><td>${first.toLocaleString()}</td>` +
      `<td>${last.toLocaleString()}</td><td>${pct(first, last)}</td></tr>`);
  }

  msg.style.display = "none";
  document.getElementById("chart").style.display = "block";
  document.getElementById("stats").style.display = "table";
  new Chart(document.getElementById("chart"), {
    type: "line",
    data: { labels, datasets },
    options: {
      plugins: { legend: { labels: { color: "#e6edf3" } } },
      scales: {
        x: { ticks: { color: "#8b949e" }, grid: { color: "#21262d" } },
        y: { ticks: { color: "#8b949e" }, grid: { color: "#21262d" } },
      },
    },
  });
}
main();
</script>
</body>
</html>
