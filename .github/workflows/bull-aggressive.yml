name: Bull — Aggressive 🔥

# AGGRO runs 10 minutes after Cautious to avoid git push collisions.
# Schedule uses EDT (UTC-4, summer). In winter (EST, UTC-5) add 1 hour.
on:
  schedule:
    - cron: '10 12 * * 1-5'  # 08:10 ET  aggro pre-market
    - cron: '45 13 * * 1-5'  # 09:45 ET  aggro market-open
    - cron: '40 16 * * 1-5'  # 12:40 ET  aggro midday
    - cron: '0 20 * * 1-5'   # 16:00 ET  aggro close
    - cron: '40 20 * * 5'    # 16:40 ET  Fri aggro weekly-review
  workflow_dispatch:
    inputs:
      routine:
        description: 'Which AGGRO routine to run'
        required: true
        type: choice
        options:
          - aggro-premarket
          - aggro-market-open
          - aggro-midday
          - aggro-close
          - aggro-weekly-review

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-genai

      - name: Make scripts executable
        run: chmod +x scripts/alpaca.sh scripts/notify.sh

      - name: Configure git identity
        run: |
          git config user.email "aggro-bull-bot@users.noreply.github.com"
          git config user.name "Aggro Bull Bot"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

      - name: Determine routine
        id: routine
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.routine }}" >> "$GITHUB_OUTPUT"
          else
            case "${{ github.event.schedule }}" in
              "10 12 * * 1-5") echo "name=aggro-premarket"    >> "$GITHUB_OUTPUT" ;;
              "45 13 * * 1-5") echo "name=aggro-market-open"  >> "$GITHUB_OUTPUT" ;;
              "40 16 * * 1-5") echo "name=aggro-midday"       >> "$GITHUB_OUTPUT" ;;
              "0 20 * * 1-5")  echo "name=aggro-close"        >> "$GITHUB_OUTPUT" ;;
              "40 20 * * 5")   echo "name=aggro-weekly-review" >> "$GITHUB_OUTPUT" ;;
            esac
          fi

      - name: Run AGGRO Bull routine
        run: python runner.py ${{ steps.routine.outputs.name }}
        env:
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          ALPACA_API_KEY_ID:     ${{ secrets.ALPACA_API_KEY_ID_AGGRO }}
          ALPACA_API_SECRET_KEY: ${{ secrets.ALPACA_API_SECRET_KEY_AGGRO }}
          ALPACA_BASE_URL:       ${{ secrets.ALPACA_BASE_URL }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
